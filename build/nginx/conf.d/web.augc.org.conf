server {
    listen 80;

    #listen 443 ssl;
    #listen [::]:443 ssl;
    #ssl_certificate /etc/ssl/certs/localhost.crt;
    #ssl_certificate_key /etc/ssl/private/localhost.key;

    root /var/www/symfony/web.augc.org/public;
    server_name web.augc.org;

    index index.php index.html;

    # ── SEGURIDAD ────────────────────────────────────────────
    # Ocultar versión de PHP
    fastcgi_hide_header X-Powered-By;

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Ocultar versión de Nginx
    server_tokens off;
    # ─────────────────────────────────────────────────────────

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass php3:9000; # Same name as the PHP service (php)
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    error_log /var/log/nginx/web.augc.org.error.log;
    access_log /var/log/nginx/web.augc.org.access.log;
}
